name: Agentic Commerce Daily Digest

on:
  schedule:
    - cron: '0 8 * * *'  # 08:00 UTC = 09:00 GMT / ~09:00 BST (±1 h seasonal drift)
  workflow_dispatch:       # allows manual trigger from the Actions tab

permissions:
  contents: write          # needed to commit sent_urls.json back to the repo

jobs:
  daily-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py --send

      - name: Commit updated sent_urls.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent_urls.json
          git diff --staged --quiet || git commit -m "chore: update sent_urls.json [skip ci]"
          git push
